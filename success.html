<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الربط بنجاح</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #ffffff; padding: 40px 30px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .success-checkmark { width: 80px; height: 80px; margin: 0 auto 20px; background-color: #28a745; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); animation: scaleUp 0.4s ease-out forwards; }
        .success-checkmark::after { content: ''; display: block; width: 20px; height: 38px; border: solid white; border-width: 0 5px 5px 0; transform: rotate(45deg); margin-top: -5px; animation: checkmark 0.3s 0.4s ease-out forwards; opacity: 0; }
        h2 { color: #28a745; font-size: 26px; margin-bottom: 10px; font-weight: bold; }
        p { color: #666; font-size: 15px; line-height: 1.6; }
        @keyframes scaleUp { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes checkmark { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="card">
    <div class="success-checkmark"></div>
    <h2>تم الربط</h2>
    <p>تم الانتهاء من مزامنة وتأكيد حسابك بنجاح داخل النظام.</p>
</div>
</body>
</html>
